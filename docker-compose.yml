services:
  exist:
    build:
      context: .
      args:
        EXISTDB_VERSION: ${EXISTDB_VERSION:-6.4.1}
      secrets:
        - seed
    image: betmasapi-exist:${EXISTDB_VERSION:-6.4.1}
    container_name: exist
    ports:
      - "8080:8080"

  # in-memory SPARQL store for the RDF/SPARQL endpoints (local/sparqlRest.xqm).
  # Not persisted - fine for testing, not for real data.
  fuseki:
    image: stain/jena-fuseki:latest
    command: ["/jena-fuseki/fuseki-server", "--mem", "/betamasaheft"]

  # exposes fuseki under /fuseki/, matching what fuseki.xqm expects, on the
  # same network namespace as "exist" so it's reachable as localhost:3030
  fuseki-proxy:
    image: nginx:alpine
    network_mode: "service:exist"
    volumes:
      - ./fuseki/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fuseki

secrets:
  seed:
    file: ./docker/seed.xq
