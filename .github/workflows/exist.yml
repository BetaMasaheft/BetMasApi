name: exist-db CI

# push+pull_request both matching a PR branch double-triggers this workflow
# for the same commit; concurrency then cancels one of the two, which shows
# up as a red "failed" check for no real reason. Scoping push to main/master
# means a PR branch push only ever fires the pull_request event, so there's
# nothing left to race - concurrency now only cancels a genuinely superseded
# run (a second push to the same PR before the first run finished).
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: betmasapi-ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-test-toolchain

      - uses: docker/setup-buildx-action@v4

      # BETMAS_APP_IMAGE (see Dockerfile) is a private ghcr.io package -
      # pulling it, not just pushing, needs auth. Same credential BetMas's
      # own workflows use to push it.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: betmas-bot
          password: ${{ secrets.BOT_CONTAINER_PAT }}

      # Full seed.xq (includes BetaMasaheftAdmin password). Configure under
      # Settings → Secrets → Actions as SEED_XQ (see docker/seed.xq.example).
      - name: Write seed.xq
        run: printf '%s\n' "$SEED_XQ" > docker/seed.xq
        env:
          SEED_XQ: ${{ secrets.SEED_XQ }}

      # Layers this repo's own package onto the published BetMas app image
      # (BETMAS_APP_IMAGE, see Dockerfile) - no more building BetMasWeb or
      # BetMasService from source here. Cached across runs, so a push that
      # only touches this repo's source rebuilds fast.
      - name: Build eXist image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: betmasapi-exist:local
          load: true
          cache-from: type=gha,scope=exist
          cache-to: type=gha,mode=max,scope=exist
          secret-files: seed=docker/seed.xq

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for eXist to start
        uses: ./.github/actions/wait-for-exist
        timeout-minutes: 2

      - name: Run bats smoke tests
        run: bats --tap test/*.bats

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          install: false

      - name: Show eXist logs on failure
        if: failure()
        run: docker logs exist

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: test/cypress/screenshots/
