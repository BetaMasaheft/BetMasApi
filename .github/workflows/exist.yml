name: exist-db CI

on: [push, pull_request]

concurrency:
  group: betmasapi-ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - exist-version: 6.4.1
            experimental: false
          # unstable dev build; failures here are early warnings, not blockers
          - exist-version: latest
            experimental: true

    env:
      EXISTDB_VERSION: ${{ matrix.exist-version }}

    steps:
      - uses: actions/checkout@v7

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get -y install bats

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - uses: docker/setup-buildx-action@v4

      # Full seed.xq (includes BetaMasaHeftAdmin password). Configure under
      # Settings → Secrets → Actions as SEED_XQ (see docker/seed.xq.example).
      - name: Write seed.xq
        run: printf '%s\n' "$SEED_XQ" > docker/seed.xq
        env:
          SEED_XQ: ${{ secrets.SEED_XQ }}

      # Builds BetMasWeb, BetMasService and this package into a fully
      # installed eXist image - see Dockerfile. Cached across runs, so a
      # push that only touches this repo's source rebuilds fast.
      - name: Build eXist image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: EXISTDB_VERSION=${{ matrix.exist-version }}
          tags: betmasapi-exist:${{ matrix.exist-version }}
          load: true
          cache-from: type=gha,scope=exist-${{ matrix.exist-version }}
          cache-to: type=gha,mode=max,scope=exist-${{ matrix.exist-version }}
          secret-files: seed=docker/seed.xq

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for eXist to start
        timeout-minutes: 2
        run: |
          until docker logs exist 2>&1 | grep -q "Server has started"; do
            echo "Still waiting..."
            sleep 2
          done

      - name: Run bats smoke tests
        run: bats --tap test/*.bats

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          install: false

      - name: Show eXist logs on failure
        if: failure()
        run: docker logs exist

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-${{ matrix.exist-version }}
          path: test/cypress/screenshots/
