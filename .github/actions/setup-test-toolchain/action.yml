name: Set up bats + Node
description: Installs bats and Node.js with npm dependencies. Shared by exist.yml and smoke.yml so a toolchain bump only needs to land in one place.

runs:
  using: composite
  steps:
    - name: Install bats
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get -y install bats

    - name: Setup Node
      uses: actions/setup-node@v7
      with:
        node-version: 24
        cache: npm

    - name: Install npm dependencies
      shell: bash
      run: npm ci
