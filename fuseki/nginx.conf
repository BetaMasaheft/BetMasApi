# BetMasWeb's fuseki.xqm hardcodes http://localhost:3030/fuseki/ (a leftover
# from when Fuseki ran inside Tomcat under that context path). Modern Fuseki
# serves datasets at the root instead, so this just adds the prefix back.
server {
    listen 3030;

    location /fuseki/ {
        proxy_pass http://fuseki:3030/;
    }
}
